<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Secure Checkout Terminal</title>
    <style>
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body {
            background-color: var(--bg-dark-cyber);
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--solid-white);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .cart-header {
            background: rgba(5, 11, 20, 0.95);
            border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .internal-logo { font-family: 'Impact', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--solid-white); text-shadow: 0 0 10px var(--cyber-blue); text-decoration: none; }
        .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        @media (max-width: 768px) { .split-layout { grid-template-columns: 1fr; } }
        .summary-card { background: rgba(5, 11, 20, 0.85); border: 1px solid var(--border-color); border-radius: 4px; padding: 30px; box-sizing: border-box; position: relative; }
        .card-title { font-family: 'Impact', sans-serif; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; color: var(--cyber-blue); margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .basket-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }
        .total-row { display: flex; justify-content: space-between; font-size: 20px; font-family: 'Impact', sans-serif; letter-spacing: 1px; color: var(--solid-white); margin-top: 25px; text-transform: uppercase; }

        .discord-info-box { background: rgba(0, 102, 255, 0.05); border: 1px dashed var(--electric-blue); padding: 20px; text-align: center; margin-bottom: 25px; border-radius: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--muted-white); }
        .form-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--electric-blue); border-radius: 4px; color: var(--solid-white); font-size: 14px; box-sizing: border-box; }
        
        .btn-cyber-checkout { background: var(--electric-blue); color: var(--solid-white); border: none; padding: 14px; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 102, 255, 0.5); transition: all 0.2s; text-align: center; display: block; text-decoration: none; box-sizing: border-box; }
        .btn-cyber-checkout:hover { background: var(--cyber-blue); color: var(--bg-dark-cyber); box-shadow: 0 0 15px var(--cyber-blue); }
        .btn-return { background: transparent; border: 1px solid var(--electric-blue); color: var(--solid-white); padding: 6px 14px; font-weight: bold; text-transform: uppercase; font-size: 12px; text-decoration: none; transition: all 0.2s; }
        .btn-return:hover { background: rgba(0, 102, 255, 0.1); border-color: var(--cyber-blue); }

        .receipt-overlay-blur { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 11, 20, 0.9); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
        .receipt-popup-hud { background: rgba(5, 11, 20, 0.95); border: 2px solid var(--cyber-blue); border-radius: 4px; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }
        .tracking-code-display-box { background: rgba(0, 0, 0, 0.5); border: 1px dashed var(--electric-blue); padding: 15px; margin: 20px 0; font-size: 24px; font-weight: bold; color: var(--cyber-blue); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .btn-copy-action { background: var(--electric-blue); color: #fff; border: none; padding: 6px 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        .cyber-warning-dialogue { background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.4); color: var(--cyber-blue); padding: 12px; font-size: 11px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="cart-header">
        <a href="minecraft.html" class="internal-logo">◀ MART STORE</a>
        <a href="minecraft.html" class="btn-return">Continue Shopping</a>
    </header>

    <div class="split-layout">
        <div class="summary-card">
            <h3 class="card-title">Order Summary <button onclick="clearCheckoutCart()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:11px;">[Clear]</button></h3>
            <div id="checkout-items-list"></div>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
            <div class="total-row"><span>Total Due</span><span id="checkout-total-display" style="color: var(--cyber-blue)">0rs</span></div>
        </div>

        <div class="summary-card">
            <h3 class="card-title">Fulfillment Setup</h3>
            <div class="discord-info-box">
                <span style="font-size:13px; color:var(--cyber-blue); font-weight:bold;">💬 Discord Manual Billing Active</span>
            </div>
            <form onsubmit="placeFinalOrder(); return false;">
                <div class="form-group"><label>Discord Username</label><input type="text" id="final-discord" required placeholder="player_handle"></div>
                <button type="submit" class="btn-cyber-checkout">Generate Code & Request Assets</button>
            </form>
        </div>
    </div>

    <div id="receipt-modal" class="receipt-overlay-blur">
        <div class="receipt-popup-hud">
            <h3 style="color: var(--cyber-blue); font-size: 26px; margin-top: 0;">Order Registered!</h3>
            <div class="tracking-code-display-box"><span id="target-code-string">CODE123</span><button type="button" class="btn-copy-action" onclick="copyFinalCode()">Copy</button></div>
            <div class="cyber-warning-dialogue">⚠️ Send this code to our staff on Discord to clear the payment!</div>
            <button type="button" class="btn-cyber-checkout" onclick="window.location.href='track.html'">Enter Tracking Gateway</button>
        </div>
    </div>

    <script>
        function renderCheckoutPage() {
            // Reads from the fresh unified 'global_mart_cart' key
            let cart = JSON.parse(localStorage.getItem('global_mart_cart')) || [];
            let container = document.getElementById('checkout-items-list');
            let totalDisplay = document.getElementById('checkout-total-display');
            if (cart.length === 0) {
                container.innerHTML = `<p style="color: var(--muted-white); font-style: italic;">Your cart is empty.</p>`;
                totalDisplay.innerText = "0rs";
                return;
            }
            let html = ""; let total = 0;
            cart.forEach(item => {
                html += `<div class="basket-item"><span>📦 ${item.name}</span><strong style="color: var(--cyber-blue)">${item.price}rs</strong></div>`;
                total += item.price;
            });
            container.innerHTML = html;
            totalDisplay.innerText = total + "rs";
        }
        function clearCheckoutCart() { localStorage.removeItem('global_mart_cart'); renderCheckoutPage(); }
        function placeFinalOrder() {
            let cart = JSON.parse(localStorage.getItem('global_mart_cart')) || [];
            const discord = document.getElementById('final-discord').value;
            let code = ""; const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let i = 0; i < 10; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
            const payload = { id: code, discord: discord, items: cart.map(i => i.name).join(', '), total: document.getElementById('checkout-total-display').innerText, status: "Pending Discord Payment" };
            let current = JSON.parse(localStorage.getItem('all_orders')) || [];
            current.push(payload); localStorage.setItem('all_orders', JSON.stringify(current));
            document.getElementById('target-code-string').innerText = code;
            document.getElementById('receipt-modal').style.display = 'flex';
            clearCheckoutCart();
        }
        function copyFinalCode() { navigator.clipboard.writeText(document.getElementById('target-code-string').innerText); alert("Code copied!"); }
        renderCheckoutPage();
    </script>
</body>
</html>
