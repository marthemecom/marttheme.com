<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Secure Gateway Access</title>
    
    
    <script src="https://google.com" async defer></script>

    <style>
        /* Strict Gaming Theme Colors (Blue & White Only) */
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body {
            background-color: var(--bg-dark-cyber);
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--solid-white);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .auth-header {
            background: rgba(5, 11, 20, 0.95);
            border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .internal-logo {
            font-family: 'Impact', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--solid-white);
            text-shadow: 0 0 10px var(--cyber-blue);
            text-decoration: none;
        }

        .auth-wrapper {
            max-width: 450px;
            margin: 60px auto;
            background: rgba(5, 11, 20, 0.85);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 102, 255, 0.15);
        }

        .auth-title {
            font-family: 'Impact', sans-serif;
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--cyber-blue);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--muted-white);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--electric-blue);
            border-radius: 4px;
            color: var(--solid-white);
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--cyber-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        .btn-cyber-submit {
            background: var(--electric-blue);
            color: var(--solid-white);
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-cyber-submit:hover {
            background: var(--cyber-blue);
            color: var(--bg-dark-cyber);
            box-shadow: 0 0 15px var(--cyber-blue);
        }

        .divider-container {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--muted-white);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider-container::before, .divider-container::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider-container:not(:empty)::before { margin-right: .5em; }
        .divider-container:not(:empty)::after { margin-left: .5em; }

        .btn-back {
            background: transparent;
            border: 1px solid var(--electric-blue);
            color: var(--solid-white);
            padding: 6px 14px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(0, 102, 255, 0.1);
            border-color: var(--cyber-blue);
        }

        /* Container forcing Google's button rendering workspace to lock dimensions so it never vanishes */
        .google-btn-centering {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
            min-height: 44px; /* Fix: Keeps a minimum height placeholder box active */
        }
    </style>
</head>
<body>

    <header class="auth-header">
        <a href="index.html" class="internal-logo">◀ MART THEME</a>
        <a href="index.html" class="btn-back">Back To Gate</a>
    </header>

    <div class="auth-wrapper">
        <h3 class="auth-title">Security Access Portal</h3>
        
        <form onsubmit="alert('Access Authorized! Moving to marketplace node...'); window.location.href='minecraft.html'; return false;">
            <div class="form-group">
                <label>Account Email</label>
                <input type="email" required placeholder="player@domain.com">
            </div>
            
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" required placeholder="••••••••••••">
            </div>

            <button type="submit" class="btn-cyber-submit">Authenticate Node</button>
        </form>

        <div class="divider-container">OR</div>

        <!-- Official Dynamic Google HTML API Initialization Node Buttons -->
        <div id="g_id_onload"
             data-client_id="://googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="google-btn-centering">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_blue"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <script>
        // Official backend listener catch returning user login properties from Google securely
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            
            alert("Google Session Verified! Welcome: " + responsePayload.name);
            
            // Redirects logged-in profile straight into your active Minecraft marketplace catalog file
            window.location.href = 'minecraft.html';
        }

        // Helper framework decoding returning Google account strings natively
        function parseJwt(token) {
            try {
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error("JWT decoding failed:", e);
                return {};
            }
        }
    </script>

</body>
</html>
