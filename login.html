<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Secure Gateway Access</title>
    <style>
        /* Strict Gaming Theme Colors (Blue & White Only) */
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body {
            background-color: var(--bg-dark-cyber);
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--solid-white);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .auth-header {
            background: rgba(5, 11, 20, 0.95);
            border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .internal-logo { font-family: 'Impact', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--solid-white); text-shadow: 0 0 10px var(--cyber-blue); text-decoration: none; }
        .auth-wrapper { max-width: 450px; margin: 60px auto; background: rgba(5, 11, 20, 0.85); border: 1px solid var(--border-color); padding: 40px; border-radius: 4px; box-shadow: 0 0 25px rgba(0, 102, 255, 0.15); }
        .auth-title { font-family: 'Impact', sans-serif; font-size: 28px; letter-spacing: 1px; text-transform: uppercase; margin-top: 0; margin-bottom: 24px; color: var(--cyber-blue); text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--muted-white); }
        .form-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--electric-blue); border-radius: 4px; color: var(--solid-white); font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--cyber-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }

        .btn-cyber-submit { background: var(--electric-blue); color: var(--solid-white); border: none; padding: 14px; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 102, 255, 0.5); transition: all 0.2s; margin-top: 10px; }
        .btn-cyber-submit:hover { background: var(--cyber-blue); color: var(--bg-dark-cyber); box-shadow: 0 0 15px var(--cyber-blue); }
        
        .divider-container { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--muted-white); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .divider-container::before, .divider-container::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider-container:not(:empty)::before { margin-right: .5em; }
        .divider-container:not(:empty)::after { margin-left: .5em; }

        .btn-back { background: transparent; border: 1px solid var(--electric-blue); color: var(--solid-white); padding: 6px 14px; font-weight: bold; text-transform: uppercase; font-size: 12px; text-decoration: none; transition: all 0.2s; }
        .btn-back:hover { background: rgba(0, 102, 255, 0.1); border-color: var(--cyber-blue); }

        .btn-custom-google {
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--electric-blue); color: var(--solid-white); border-radius: 4px; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-decoration: none; box-sizing: border-box;
        }
        .btn-custom-google:hover { background: rgba(255, 255, 255, 0.15); border-color: var(--cyber-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        .google-vector-icon { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <header class="auth-header">
        <a href="index.html" class="internal-logo">◀ MART THEME</a>
        <a href="index.html" class="btn-back">Back To Gate</a>
    </header>

    <div class="auth-wrapper">
        <h3 class="auth-title">Security Access Portal</h3>
        
        <form onsubmit="executeManualFormSession(); return false;">
            <div class="form-group">
                <label>Account Email</label>
                <input type="email" id="manual-email" required placeholder="player@domain.com">
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" required placeholder="••••••••••••">
            </div>
            <button type="submit" class="btn-cyber-submit">Authenticate Node</button>
        </form>

        <div class="divider-container">OR</div>

        <!-- ⚡ TARGET FIXED LINK INTERFACE BUTTON TRIGGER ⚡ -->
        <button type="button" class="btn-custom-google" onclick="triggerBypassAuth()">
            <svg class="google-vector-icon" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114A5.87 5.87 0 0 1 8.1 12.63a5.87 5.87 0 0 1 5.89-5.885c2.42 0 4.41 1.554 5.253 3.734l3.924-3.04C20.932 3.12 16.924 1 13.99 1 7.92 1 3 5.92 3 11.99s4.92 11 10.99 11c6.51 0 10.435-4.63 10.435-10.63 0-.61-.065-1.3-.18-2.075H12.24Z"/>
            </svg>
            Sign In with Google
        </button>
    </div>

    <script>
        function triggerBypassAuth() {
            // Your custom active Client ID 
            const clientID = "335973319597-25qb156v1l8492pr0hbc9o6hip8e0rnc.apps.googleusercontent.com";
            
            // Auto-detect redirect domain origin link path location safely
            const redirectLocationUri = window.location.origin + window.location.pathname;
            
            // Packs variables together smoothly into an unblockable real target URL string 
            const googleParams = new URLSearchParams();
            googleParams.append('client_id', clientID);
            googleParams.append('redirect_uri', redirectLocationUri);
            googleParams.append('response_type', 'token'); 
            googleParams.append('scope', 'https://googleapis.com https://googleapis.com');
            googleParams.append('state', 'mart_marketplace_session');
            
            // Redirects straight to the verified Google login prompt view screen
            window.location.href = "https://google.com?" + googleParams.toString();
        }

        function executeManualFormSession() {
            let emailVal = document.getElementById('manual-email').value;
            const fallbackUser = { name: emailVal.split('@')[0], email: emailVal, picture: '' };
            localStorage.setItem('authenticated_user_node', JSON.stringify(fallbackUser));
            alert('Access Authorized! Moving to marketplace node...');
            window.location.href = 'minecraft.html';
        }

        // 🔄 AUTOMATIC REAL-TIME USER DATA EXTRACTION LOOPS 🔄
        window.onload = function() {
            const URLHashParameters = new URLSearchParams(window.location.hash.substring(1));
            const activeToken = URLHashParameters.get('access_token');

            if (activeToken) {
                // Instantly reads your user profile information packet data straight from Google API channels
                fetch('https://googleapis.com', {
                    headers: { 'Authorization': `Bearer ${activeToken}` }
                })
                .then(res => res.json())
                .then(profileData => {
                    const authenticatedUser = {
                        name: profileData.name,
                        email: profileData.email,
                        picture: profileData.picture
                    };
                    // Writes into central memory network storage slot
                    localStorage.setItem('authenticated_user_node', JSON.stringify(authenticatedUser));
                    
                    alert(`Google Authentication Successful! Welcome, ${authenticatedUser.name}.`);
                    window.location.href = "index.html"; // Returns user home to load profile widgets!
                })
                .catch(err => {
                    console.error("Profile load sync dropped log error:", err);
                    window.location.href = "minecraft.html";
                });
            }
        }
    </script>
</body>
</html>
