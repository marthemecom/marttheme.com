<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Minecraft Node</title>
    <style>
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --glass-blue: rgba(0, 102, 255, 0.08);
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body {
            background-color: var(--bg-dark-cyber);
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--solid-white);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .gaming-header {
            background: rgba(5, 11, 20, 0.95);
            border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .internal-logo { font-family: 'Impact', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--solid-white); text-shadow: 0 0 10px var(--cyber-blue); text-decoration: none; }
        .marketplace-tabs-bar { display: flex; gap: 15px; margin-bottom: 35px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-top: 20px; }

        .tab-pill {
            background: transparent;
            border: 1px solid var(--electric-blue);
            padding: 12px 24px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--solid-white);
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        .tab-pill.active-pill { background: rgba(0, 102, 255, 0.3); border-color: var(--cyber-blue); text-shadow: 0 0 5px var(--cyber-blue); }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; }
        .gaming-product-card { background: rgba(5, 11, 20, 0.85); border: 1px solid rgba(0, 102, 255, 0.3); padding: 24px; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; box-sizing: border-box; transition: all 0.25s; }
        .gaming-product-card:hover { border-color: var(--cyber-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.25); transform: translateY(-3px); }

        .game-badge { font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: var(--bg-dark-cyber); background: var(--cyber-blue); padding: 3px 8px; align-start: flex-start; margin-bottom: 15px; }
        .gaming-product-card h4 { margin: 0 0 20px 0; font-size: 18px; font-weight: bold; line-height: 1.4; }
        .price-row-gaming { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-gaming { font-family: 'Impact', sans-serif; font-size: 24px; color: var(--cyber-blue); }
        .action-container-gaming { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-cyber { background: var(--electric-blue); color: var(--solid-white); border: none; padding: 10px 14px; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 102, 255, 0.3); transition: all 0.2s; text-decoration: none; text-align: center; }
        .btn-cyber:hover { background: var(--cyber-blue); color: var(--bg-dark-cyber); box-shadow: 0 0 15px var(--cyber-blue); }
        .btn-cyber-outline { background: transparent; border: 1px solid var(--electric-blue); color: var(--solid-white); padding: 10px 14px; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; }
        .btn-cyber-outline:hover { background: rgba(0, 102, 255, 0.1); border-color: var(--cyber-blue); }

        /* 🛒 FIXED: SLIDING CHECKOUT PANEL SLIDER LAYER 🛒 */
        .cart-slider-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100%;
            background: rgba(5, 11, 20, 0.98);
            border-left: 2px solid var(--electric-blue);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            transition: right 0.3s ease;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .cart-slider-drawer.open-drawer { right: 0; }
        
        .basket-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,102,255,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; color: var(--muted-white); }
        .form-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--electric-blue); border-radius: 4px; color: var(--solid-white); box-sizing: border-box; }
        
        /* MODAL POPUP */
        .receipt-overlay-blur { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 11, 20, 0.9); backdrop-filter: blur(5px); z-index: 3000; align-items: center; justify-content: center; }
        .receipt-popup-hud { background: rgba(5, 11, 20, 0.95); border: 2px solid var(--cyber-blue); border-radius: 4px; padding: 40px; width: 90%; max-width: 450px; text-align: center; }
        .tracking-code-display-box { background: rgba(0, 0, 0, 0.5); border: 1px dashed var(--electric-blue); padding: 15px; margin: 20px 0; font-size: 24px; font-weight: bold; color: var(--cyber-blue); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .cyber-warning-dialogue { background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.4); color: var(--cyber-blue); padding: 12px; font-size: 11px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

    <header class="gaming-header">
        <a href="index.html" class="internal-logo">◀ MART THEME HUB</a>
        <div style="display: flex; align-items: center; gap: 25px;">
            <a href="track.html" style="font-weight: bold; color: var(--solid-white); text-decoration: none; font-size: 14px; letter-spacing: 1px;">📡 TRACK ORDER</a>
            <!-- Clicking this opens the slide panel drawer instantly -->
            <button type="button" class="btn-cyber-outline" style="border:none; color:var(--cyber-blue); font-size:14px; background:none; cursor:pointer;" onclick="toggleCartDrawer()">🛒 VIEW CART (<span id="count">0</span>)</button>
            <a href="index.html" class="btn-cyber" style="padding: 6px 14px; text-decoration: none;">LOGOUT</a>
        </div>
    </header>

    <div style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
        <div class="marketplace-tabs-bar">
            <a href="minecraft.html" class="tab-pill active-pill">⛏️ Minecraft Store</a>
            <a href="store-graphics.html" class="tab-pill">🎬 Editing & Graphics</a>
        </div>

        <div class="catalog-grid">
            <div class="gaming-product-card">
                <div><span class="game-badge">MCFA ACC</span><h4>Minecraft Full Access Account</h4></div>
                <div>
                    <div class="price-row-gaming"><span class="price-gaming">700rs</span></div>
                    <div class="action-container-gaming">
                        <button type="button" class="btn-cyber-outline" onclick="addItemToSliderCart('Minecraft Full Access Account', 700)">Add to Cart</button>
                        <button type="button" class="btn-cyber" onclick="buyNowSliderCart('Minecraft Full Access Account', 700)">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🛒 SLIDING DRAWER CART COMPONENT 🛒 -->
    <div id="cart-drawer" class="cart-slider-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">
            <h3 style="font-family:'Impact', sans-serif; color:var(--cyber-blue); margin:0; text-transform:uppercase;">Invoice Panel</h3>
            <button onclick="toggleCartDrawer()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div id="drawer-items-list"></div>
        <div style="display:flex; justify-content:space-between; margin:20px 0; font-family:'Impact', sans-serif; font-size:18px; text-transform:uppercase;">
            <span>Total:</span><span id="drawer-total-price" style="color:var(--cyber-blue)">0rs</span>
        </div>
        
        <form onsubmit="processDrawerCheckout(); return false;" style="margin-top:30px;">
            <div class="form-group">
                <label>Discord Username Handle</label>
                <input type="text" id="drawer-discord" required placeholder="player_username">
            </div>
            <button type="submit" class="btn-cyber" style="width:100%; padding:12px; font-weight:bold;">Request Verification Node</button>
            <button type="button" class="btn-cyber-outline" style="width:100%; padding:10px; margin-top:10px; color:#ff4d4d; border-color:#ff4d4d;" onclick="wipeDrawerCart()">Clear Basket</button>
