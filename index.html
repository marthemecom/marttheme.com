<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Gaming Gateway Portal</title>
    <style>
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
        }

        body {
            background-color: var(--bg-dark-cyber);
            color: var(--solid-white);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; /* Prevents unwanted double scrolling bars */
        }

        /* ❌ MASTER LIVE VIDEO WALLPAPER CONTAINER ❌ */
        .live-video-wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Forces the video to cover the whole screen without stretching */
            z-index: -2; /* Pushes the video behind everything else */
        }

        /* Dark overlay filter tint over the video to make your white text pop */
        .video-dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(5, 11, 20, 0.75), rgba(5, 11, 20, 0.95));
            z-index: -1; /* Sits directly on top of the video but behind the text */
            backdrop-filter: blur(2px); /* Optional: Softly blurs your video background */
        }

        /* The clear layout wrapper containing your interactive text buttons */
        .gateway-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .gateway-logo {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 64px;
            letter-spacing: 4px;
            color: var(--solid-white);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.8), 0 0 40px rgba(0, 102, 255, 0.4);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .gateway-subtitle {
            color: var(--cyber-blue);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 45px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        .gateway-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .btn-gateway {
            background: rgba(5, 11, 20, 0.75);
            border: 2px solid var(--electric-blue);
            color: var(--solid-white);
            padding: 18px 30px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.2);
            text-decoration: none;
            display: block;
            text-align: center;
            border-radius: 4px;
        }

        .btn-gateway:hover {
            background: var(--cyber-blue);
            color: var(--bg-dark-cyber);
            box-shadow: 0 0 25px var(--cyber-blue);
            border-color: var(--cyber-blue);
            transform: translateY(-3px);
        }

        .btn-gateway.highlight {
            background: var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.5);
        }
        
        .btn-gateway.highlight:hover {
            background: var(--cyber-blue);
            color: var(--bg-dark-cyber);
            box-shadow: 0 0 30px var(--cyber-blue);
        }
    </style>
</head>
<body>

    <!-- ⚡ REAL LIVE VIDEO ENGINE ⚡ -->
    <!-- playsinline, autoplay, muted, and loop are completely required for browsers to allow background auto-run profiles -->
    <video class="live-video-wallpaper" playsinline autoplay muted loop>
        <source src="background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Dark layout tint layer over the video clip matrix -->
    <div class="video-dark-overlay"></div>

    <!-- Active Text Options Layer -->
    <div class="gateway-container">
        <div class="gateway-logo">MART THEME</div>
        <div class="gateway-subtitle">PREMIUM DIGITAL GAMING HUB PORTAL</div>
        
        <div class="gateway-options">
            <a href="minecraft.html" class="btn-gateway highlight">🏪 Enter Marketplace</a>
            <a href="login.html" class="btn-gateway">🔑 Account Login</a>
            <a href="login.html" class="btn-gateway">📝 Create Account / Sign Up</a>
        </div>
    </div>

</body>
</html>
