<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Gateway Terminal</title>
    
    <script src="https://google.com" async defer></script>
    <style>
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark-cyber);
            overflow: hidden;
        }

        /* 🎥 THE LIVE WALLPAPER VIDEO COMPONENT 🎥 */
        .video-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .video-background-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CENTRAL INTERFACE PANEL HUB */
        .gateway-card-hud {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 11, 20, 0.6);
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .terminal-header {
            font-family: 'Impact', sans-serif;
            font-size: 54px;
            letter-spacing: 2px;
            color: var(--solid-white);
            text-shadow: 0 0 20px var(--cyber-blue);
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .terminal-subtitle {
            color: var(--muted-white);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 35px 0;
        }

        .auth-container-wrapper {
            background: rgba(5, 11, 20, 0.85);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-audio-activate {
            background: var(--electric-blue);
            color: var(--solid-white);
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.4);
            transition: all 0.2s;
            font-size: 12px;
            width: 100%;
        }

        .btn-audio-activate:hover {
            background: var(--cyber-blue);
            color: #000;
            box-shadow: 0 0 20px var(--cyber-blue);
        }
    </style>
</head>
<body>

    <!-- 🔊 LIVE VIDEO WALLPAPER BACKDROP CORE 🔊 -->
    <div class="video-background-layer">
        <!-- Starts muted so the browser engine permits instant autoplay on screen load -->
        <video id="terminal-live-wallpaper" autoplay loop playsinline muted>
            <!-- ⚠️ Replace this video address with your exact .mp4 background loop asset link string ⚠️ -->
            <source src="https://w3schools.com" type="video/mp4">
        </video>
    </div>

    <!-- MAIN ACCESS HUD TERMINAL -->
    <div class="gateway-card-hud">
        <h1 class="terminal-header">Mart Marketplace</h1>
        <p class="terminal-subtitle">Console Matrix Authorization Gateway</p>

        <div class="auth-container-wrapper">
            <!-- 🔊 UNMUTING CONTROL BUTTON NODE: Restores browser authorization safely 🔊 -->
            <button type="button" id="audio-btn" class="btn-audio-activate" onclick="triggerAutomaticAudioSync()">🔊 Enable Wallpaper Sound</button>

            <!-- Google Client Script Configuration Element Row -->
            <div id="g_id_onload"
                data-client_id="://googleusercontent.com"
                data-context="signin"
                data-ux_mode="popup"
                data-callback="onGoogleAuthSuccess"
                data-auto_select="false">
            </div>

            <!-- Standard Native Google Single Sign On UI Button Render Container Slot -->
            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="filled_blue"
                data-text="signin_with"
                data-size="large"
                data-logo_alignment="left">
            </div>
        </div>
    </div>

    <script>
        // ❌ REPAIRED SOUND SWITCHER: Unmutes wallpaper securely without blocking other container tags ❌
        function triggerAutomaticAudioSync() {
            let wallpaperVideo = document.getElementById('terminal-live-wallpaper');
            if (wallpaperVideo) {
                wallpaperVideo.muted = false; 
                wallpaperVideo.play();        
            }
            
            // Replaces button text with active confirmation message cleanly
            let btn = document.getElementById('audio-btn');
            if (btn) {
                btn.innerText = "🎵 Sound Frequencies Online";
                btn.style.background = "rgba(0, 210, 255, 0.2)";
                btn.style.color = "var(--cyber-blue)";
                btn.style.borderColor = "var(--cyber-blue)";
                btn.disabled = true;
            }
        }

        // Handles user account verification checks and opens your item pages
        function onGoogleAuthSuccess(googleCredentialPayload) {
            console.log("Account Identity Verified Token:", googleCredentialPayload.credential);
            alert("👑 Access Granted! Initializing market sector components...");
            window.location.href = 'minecraft.html';
        }
    </script>
</body>
</html>
