<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Gateway Terminal</title>
    <style>
        /* Strict Gaming Theme Colors (Blue & White Only) */
        :root {
            --bg-dark-cyber: #050b14;
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark-cyber);
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .gateway-card-hud {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        .terminal-header {
            font-family: 'Impact', sans-serif;
            font-size: 54px;
            letter-spacing: 2px;
            color: var(--solid-white);
            text-shadow: 0 0 20px var(--cyber-blue);
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .terminal-subtitle {
            color: var(--muted-white);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
        }

        /* 📋 THE ORIGINAL 3-LINE BUTTON STACK CONTAINER 📋 */
        .options-button-stack-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn-matrix-action {
            background: rgba(5, 11, 20, 0.85);
            color: var(--solid-white);
            border: 1px solid var(--electric-blue);
            padding: 16px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.15);
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-matrix-action:hover {
            background: var(--electric-blue);
            color: var(--solid-white);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            text-shadow: 0 0 5px var(--solid-white);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="gateway-card-hud">
        <h1 class="terminal-header">Mart Marketplace</h1>
        <p class="terminal-subtitle">Console Matrix Authorization Gateway</p>

        <!-- ⚡ FIXED ROADS: Pointing strictly to your pre-existing files ⚡ -->
        <div class="options-button-stack-container">
            <!-- Line 1: Enter Marketplace -->
            <a href="minecraft.html" class="btn-matrix-action">Enter Marketplace</a>
            
            <!-- Line 2: Login Terminal (Routes to your premium Google login page) -->
            <a href="login.html" class="btn-matrix-action">Login Terminal</a>
            
            <!-- Line 3: Sign Up (Routes to the same terminal node handler page) -->
            <a href="login.html" class="btn-matrix-action">Sign Up</a>
        </div>
    </div>

</body>
</html>
