<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Gateway Terminal</title>
    <style>
        /* Strict Gaming Theme Colors (Blue & White Only) */
        :root {
            --bg-dark-cyber: rgba(5, 11, 20, 0.4);
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #050b14;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            perspective: 1000px; /* Activates the 3D depth field layout window */
        }

        /* 🎥 THE LIVE WALLPAPER VIDEO BACKDROP LAYER 🎥 */
        .live-wallpaper-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .live-wallpaper-backdrop video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cyber-grid-tint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .gateway-card-hud {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            z-index: 10;
            transform-style: preserve-3d; /* Allows the elements inside to tilt in 3D space */
        }

        /* ❌ FIXED: Clean, un-truncated 3D interactive movement target title heading ❌ */
        .terminal-header {
            font-family: 'Impact', sans-serif;
            font-size: 54px;
            letter-spacing: 2px;
            color: var(--solid-white);
            text-shadow: 0 0 20px var(--cyber-blue);
            margin: 0 0 5px 0;
            text-transform: uppercase;
            transition: transform 0.1s ease-out; /* Smooths out the mouse tracking lag */
            will-change: transform;
            transform: translateZ(50px); /* Gives the text a physical floating height look */
            cursor: default;
            user-select: none;
        }

        .terminal-subtitle {
            color: var(--muted-white);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
        }

        .options-button-stack-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn-matrix-action {
            background: rgba(5, 11, 20, 0.85);
            color: var(--solid-white);
            border: 1px solid var(--electric-blue);
            padding: 16px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.15);
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-matrix-action:hover {
            background: var(--electric-blue);
            color: var(--solid-white);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            text-shadow: 0 0 5px var(--solid-white);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- 🎥 LIVE WALLPAPER BACKDROP CORE 🎥 -->
    <div class="live-wallpaper-backdrop">
        <video autoplay loop playsinline muted id="live-video">
            <!-- ⚡ DIRECT OPEN NETWORK LINK: Bypasses Git file size drop blocks securely ⚡ -->
            <source src="https://mixkit.co" type="video/mp4">
        </video>
    </div>
    <div class="cyber-grid-tint-overlay"></div>

    <!-- MAIN ACCESS HUD TERMINAL -->
    <div class="gateway-card-hud">
        <!-- 3D Mouse Tracking Text Target Heading Node -->
        <h1 class="terminal-header" id="dynamic-3d-title">Mart Marketplace</h1>
        <p class="terminal-subtitle">Console Matrix Authorization Gateway</p>

        <div class="options-button-stack-container">
            <a href="minecraft.html" class="btn-matrix-action">Enter Marketplace</a>
            <a href="login.html" class="btn-matrix-action">Login Terminal</a>
            <a href="login.html" class="btn-matrix-action">Sign Up</a>
        </div>
    </div>

    <script>
        // 🔮 INTERACTIVE REAL-TIME 3D TEXT MOUSE-TRACKING CONTROLLER ENGINE 🔮
        const dynamicTitle = document.getElementById('dynamic-3d-title');

        window.addEventListener('mousemove', (mouseEvent) => {
            // Tracks the exact physical coordinate center of your screen viewport
            const horizontalScreenCenter = window.innerWidth / 2;
            const verticalScreenCenter = window.innerHeight / 2;

            // Calculates the offset coordinates of your cursor from the center spot
            const horizontalOffsetDistance = mouseEvent.clientX - horizontalScreenCenter;
            const verticalOffsetDistance = mouseEvent.clientY - verticalScreenCenter;

            // Map distances to exact maximum 3D rotation angle limits (caps tilt to 25 degrees)
            const maximumRotationLimit = 25;
            const targetXRotationAngle = -(verticalOffsetDistance / verticalScreenCenter) * maximumRotationLimit;
            const targetYRotationAngle = (horizontalOffsetDistance / horizontalScreenCenter) * maximumRotationLimit;

            // Injects the computed 3D matrix transform state live onto your marketplace heading layout
            dynamicTitle.style.transform = `rotateX(${targetXRotationAngle}deg) rotateY(${targetYRotationAngle}deg) translateZ(50px)`;
        });

        // Automatically centers the header if the mouse cursor leaves the browser window focus parameters
        window.addEventListener('mouseleave', () => {
            dynamicTitle.style.transform = 'rotateX(0deg) rotateY(0deg) translateZ(50px)';
        });
    </script>
</body>
</html>
