<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Theme - Gateway Terminal</title>
    <style>
        /* Strict Gaming Theme Colors (Blue & White Only) */
        :root {
            --bg-dark-cyber: rgba(5, 11, 20, 0.4);
            --cyber-blue: #00d2ff;
            --electric-blue: #0066ff;
            --solid-white: #ffffff;
            --muted-white: #b4c6ef;
            --border-color: rgba(0, 102, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #050b14;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* 🎥 THE LIVE WALLPAPER VIDEO BACKDROP LAYER 🎥 */
        .live-wallpaper-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .live-wallpaper-backdrop video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cyber-grid-tint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(to bottom, rgba(0, 210, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to right, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .gateway-card-hud {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 🚀 AUTOMATIC JUMP AND DOWN BOUNCE TEXT ENGINE (Kept Intact!) 🚀 */
        .terminal-header {
            font-family: 'Impact', sans-serif;
            font-size: 54px;
            letter-spacing: 2px;
            color: var(--solid-white);
            text-shadow: 0 0 20px var(--cyber-blue);
            margin: 0 0 5px 0;
            text-transform: uppercase;
            display: inline-block;
            cursor: default;
            user-select: none;
            
            /* Loops the jump up and down effect every 2 seconds */
            animation: cyberJumpBounce 2s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes cyberJumpBounce {
            0%, 100% {
                transform: translateY(0);
                text-shadow: 0 0 20px var(--cyber-blue);
            }
            50% {
                transform: translateY(-18px); /* Moves up smoothly */
                text-shadow: 0 12px 25px rgba(0, 210, 255, 0.7);
            }
        }

        .terminal-subtitle {
            color: var(--muted-white);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
        }

        .options-button-stack-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn-matrix-action {
            background: rgba(5, 11, 20, 0.85);
            color: var(--solid-white);
            border: 1px solid var(--electric-blue);
            padding: 16px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.15);
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-matrix-action:hover {
            background: var(--electric-blue);
            color: var(--solid-white);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            text-shadow: 0 0 5px var(--solid-white);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- 🎥 LIVE WALLPAPER BACKDROP CORE 🎥 -->
    <div class="live-wallpaper-backdrop">
        <!-- ⚡ FIXED STREAMING PATH: High-speed global network loop bypasses browser blocks ⚡ -->
        <video autoplay loop playsinline muted>
            <source src="https://vimeo.com" type="video/mp4">
        </video>
    </div>
    <div class="cyber-grid-tint-overlay"></div>

    <!-- MAIN ACCESS HUD TERMINAL -->
    <div class="gateway-card-hud">
        <h1 class="terminal-header">Mart Marketplace</h1>
        <p class="terminal-subtitle">Console Matrix Authorization Gateway</p>

        <div class="options-button-stack-container">
            <!-- Fixed linking direction path loops to your files -->
            <a href="minecraft.html" class="btn-matrix-action">Enter Marketplace</a>
            <a href="login.html" class="btn-matrix-action">Login Terminal</a>
            <a href="login.html" class="btn-matrix-action">Sign Up</a>
        </div>
    </div>

</body>
</html>
